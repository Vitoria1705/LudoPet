<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Pet Perdido - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="text-primary fw-bold mb-3">Cadastrar pet perdido</h1>
            <p class="text-muted">Informe os dados principais para que o pet apare&ccedil;a na p&aacute;gina Pet Alerta.</p>

            <form th:action="@{/salvarPet}" th:object="${pet}" method="post" class="card p-4">
                <label class="form-label" for="nome">Nome</label>
                <input id="nome" type="text" th:field="*{nome}" class="form-control mb-3" required>

                <label class="form-label" for="raca">Ra&ccedil;a</label>
                <input id="raca" type="text" th:field="*{raca}" class="form-control mb-3" required>

                <label class="form-label" for="idade">Idade</label>
                <input id="idade" type="number" th:field="*{idade}" class="form-control mb-3" min="0">

                <label class="form-label" for="cor">Cor</label>
                <input id="cor" type="text" th:field="*{cor}" class="form-control mb-3" required>

                <label class="form-label" for="local">&Uacute;ltimo local visto</label>
                <input id="local" type="text" th:field="*{local}" class="form-control mb-3" required>

                <label class="form-label" for="imagem">Imagem</label>
                <input id="imagem" type="text" th:field="*{imagem}" class="form-control mb-4" placeholder="/img/padrao.png">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <a th:href="@{/petalerta}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
