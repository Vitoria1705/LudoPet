<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastrar Pet Perdido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Cadastrar Pet Perdido</h2>

    <form th:action="@{/salvarPet}" th:object="${pet}" method="post">

        <input type="text" th:field="*{nome}" class="form-control mb-2" placeholder="Nome">

        <input type="text" th:field="*{raca}" class="form-control mb-2" placeholder="Raça">

        <input type="number" th:field="*{idade}" class="form-control mb-2" placeholder="Idade">

        <input type="text" th:field="*{cor}" class="form-control mb-2" placeholder="Cor">

        <input type="text" th:field="*{local}" class="form-control mb-2" placeholder="Último local">

        <input type="text" th:field="*{imagem}" class="form-control mb-2" placeholder="/images/pet1.jpg">

        <button class="btn btn-success">
            Salvar
        </button>

    </form>
</div>

</body>
</html>
