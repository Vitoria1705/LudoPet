<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Animal Perdido - LudoPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <section class="form-shell">
                <span class="section-kicker">Pet Alerta</span>
                <h1>Cadastrar animal perdido</h1>
                <p class="text-muted">Informe os dados do animal para que a comunidade possa ajudar a encontrá-lo.</p>

                <form th:action="@{/salvar-animal-perdido}"
                      th:object="${animal}"
                      method="post"
                      enctype="multipart/form-data"
                      class="row g-3 mt-2">

                    <div class="col-md-6">
                        <label class="form-label">Nome do animal</label>
                        <input type="text" th:field="*{nome}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Espécie</label>
                        <select th:field="*{especie}" class="form-select">
                            <option value="Cachorro">Cachorro</option>
                            <option value="Gato">Gato</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Raça</label>
                        <input type="text" th:field="*{raca}" class="form-control" placeholder="SRD, Labrador...">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Cor predominante</label>
                        <input type="text" th:field="*{cor}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Cidade</label>
                        <input type="text" th:field="*{cidade}" class="form-control" placeholder="São Luís" value="São Luís">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Telefone para contato</label>
                        <input type="text" th:field="*{telefone}" class="form-control" placeholder="(98) 99999-9999">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <input type="text" th:field="*{descricao}" class="form-control"
                               placeholder="Detalhes que ajudam a identificar o animal...">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Foto do animal</label>
                        <input type="file" name="arquivo" accept="image/*" class="form-control">
                        <small class="text-muted">Envie uma foto clara do animal</small>
                    </div>

                    <div class="col-12 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success btn-lg">
                            Publicar no Pet Alerta
                        </button>
                        <a th:href="@{/animais-perdidos}" class="btn btn-outline-secondary btn-lg">
                            Cancelar
                        </a>
                    </div>

                </form>
            </section>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
