<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Pet Perdido - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <section class="form-shell">
                <span class="section-kicker">Pet Alerta</span>
                <h1>Cadastrar pet perdido</h1>
                <p class="text-muted">Informe dados claros para que outras pessoas consigam reconhecer o animal no banco de imagens.</p>

                <form th:action="@{/salvarPet}" th:object="${pet}" method="post" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="nome">Nome do pet</label>
                        <input id="nome" type="text" th:field="*{nome}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="raca">Raca</label>
                        <input id="raca" type="text" th:field="*{raca}" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="idade">Idade</label>
                        <input id="idade" type="number" th:field="*{idade}" class="form-control" min="0">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="cor">Cor predominante</label>
                        <input id="cor" type="text" th:field="*{cor}" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="local">Ultimo local visto</label>
                        <input id="local" type="text" th:field="*{local}" class="form-control" placeholder="Bairro, Sao Luis - MA" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="imagem">URL da imagem</label>
                        <input id="imagem" type="text" th:field="*{imagem}" class="form-control" placeholder="/img/padrao.png">
                    </div>

                    <div class="col-12 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success btn-lg">Salvar no Pet Alerta</button>
                        <a th:href="@{/petalerta}" class="btn btn-outline-secondary btn-lg">Cancelar</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
