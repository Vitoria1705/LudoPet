<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Animal Perdido - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <section class="form-shell">
                <span class="section-kicker">Mural de perdidos</span>
                <h1>Cadastrar animal perdido</h1>
                <p class="text-muted">Preencha o maximo de detalhes possivel para facilitar o reconhecimento.</p>

                <form action="/salvar-animal-perdido" method="post" enctype="multipart/form-data" class="row g-3">
                    <div class="col-12">
                        <label class="form-label" for="arquivo">Foto</label>
                        <input id="arquivo" type="file" name="arquivo" class="form-control" accept="image/*">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="nome">Nome</label>
                        <input id="nome" type="text" name="nome" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="especie">Especie</label>
                        <input id="especie" type="text" name="especie" class="form-control" placeholder="Cachorro, gato...">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="raca">Raca</label>
                        <input id="raca" type="text" name="raca" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="cor">Cor</label>
                        <input id="cor" type="text" name="cor" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="cidade">Cidade</label>
                        <input id="cidade" type="text" name="cidade" class="form-control" value="Sao Luis - MA">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="telefone">Telefone para contato</label>
                        <input id="telefone" type="text" name="telefone" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="foto">Nome da foto, se ja estiver na pasta /img</label>
                        <input id="foto" type="text" name="foto" class="form-control" placeholder="Ex: perdidos/dog1.jpg">
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="descricao">Descricao</label>
                        <textarea id="descricao" name="descricao" class="form-control" rows="5"></textarea>
                    </div>

                    <div class="col-12 d-flex gap-2 flex-wrap">
                        <button class="btn btn-success btn-lg" type="submit">Salvar registro</button>
                        <a href="/animais-perdidos" class="btn btn-outline-secondary btn-lg">Cancelar</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
