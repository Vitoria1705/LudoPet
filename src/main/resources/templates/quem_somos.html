<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quem Somos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container mt-5">
    <h2 class="text-center mb-4">Quem Somos</h2>

    <p class="text-center">
        O LudoPet e um projeto dedicado a adocao responsavel e ao bem-estar animal.
    </p>

    <h3 class="text-center mt-5">Fundadores</h3>

    <div class="row text-center mt-4">
        <div class="col-md-4">
            <img src="/img/dev/waleska.jpeg" alt="Waleska Gabryelle" class="foto-fundador">
            <h5>Waleska Gabryelle</h5>
            <p>Desenvolvedora</p>
        </div>

        <div class="col-md-4">
            <img src="/img/dev/renato.jpeg" alt="Renato Simoes" class="foto-fundador">
            <h5>Renato Simoes</h5>
            <p>Designer</p>
        </div>

        <div class="col-md-4">
            <img src="/img/dev/vitoria.jpeg" alt="Vitoria Escorcio" class="foto-fundador">
            <h5>Vitoria Escorcio</h5>
            <p>Desenvolvedora</p>
        </div>
    </div>
</main>

</body>
</html>
