<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalhes do Animal - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container py-5">
    <a th:href="@{/adocao}" class="btn btn-outline-secondary mb-4">Voltar para adocao</a>

    <section class="detail-layout">
        <img th:src="@{'/img/' + ${animal.foto}}"
             class="detail-photo"
             th:alt="|Foto de ${animal.nome}|"
             onerror="this.src='/img/padrao.png'">

        <div class="detail-panel">
            <span class="section-kicker">Detalhes do animal</span>
            <h1 th:text="${animal.nome}">Nome</h1>
            <p class="lead" th:text="${animal.descricao}">Descricao do animal</p>

            <div class="pet-facts detail-facts">
                <span><strong>Raca</strong><small th:text="${animal.raca}">SRD</small></span>
                <span><strong>Idade</strong><small th:text="${animal.idade}">0</small></span>
                <span><strong>Sexo</strong><small th:text="${animal.sexo}">Sexo</small></span>
                <span><strong>Porte</strong><small th:text="${animal.porte}">Porte</small></span>
            </div>

            <div class="adoption-steps">

                <div>
                    <strong>1</strong>
                    <span>Conheça melhor o pet</span>
                </div>

                <div>
                    <strong>2</strong>
                    <span>Envie sua solicitação</span>
                </div>

                <div>
                    <strong>3</strong>
                    <span>Nossa equipe entrará em contato</span>
                </div>

            </div>

            <a class="btn btn-success btn-lg w-100"
               th:href="@{/formulario-adocao/{id}(id=${animal.id})}">
                Quero adotar
            </a>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
