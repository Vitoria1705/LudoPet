<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pet Alerta - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container py-5">

    <section class="page-hero mb-4">
        <h1>Pet Alerta</h1>
        <p>Encontre pets perdidos cadastrados no sistema.</p>

        <a href="/novo-animal-perdido" class="btn btn-success">
            Cadastrar pet perdido
        </a>
    </section>

    <!-- CONTADOR -->
    <div class="mb-3">
        <h4 th:text="|${#lists.size(animais)} registros|">0 registros</h4>
    </div>

    <!-- SE NÃO TIVER PETS -->
    <div class="alert alert-light border"
         th:if="${#lists.isEmpty(animais)}">
        Nenhum pet perdido cadastrado até o momento.
    </div>

    <!-- LISTA -->
    <div class="row g-4"
         th:if="${!#lists.isEmpty(animais)}">

        <div class="col-md-6 col-lg-4"
             th:each="animal : ${animais}">

            <div class="card h-100 shadow-sm">

                <img class="card-img-top"
                     th:src="${animal.foto != null ? animal.foto : '/img/padrao.png'}"
                     alt="Foto do pet">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${animal.nome}">
                        Nome
                    </h5>

                    <p class="card-text">

                        <strong>Raça:</strong>
                        <span th:text="${animal.raca}"></span>

                        <br>

                        <strong>Cor:</strong>
                        <span th:text="${animal.cor}"></span>

                        <br>

                        <strong>Cidade:</strong>
                        <span th:text="${animal.cidade}"></span>

                    </p>

                </div>
            </div>

        </div>

    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
