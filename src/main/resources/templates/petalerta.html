<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet Alerta - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1 class="text-primary fw-bold">🔎 Pet Alerta</h1>
        <p>Ajudando pets perdidos a encontrarem seus lares.</p>
    </div>

    <div class="alert alert-primary text-center">
        <h5>✨ Busca Inteligente (em breve)</h5>
        <p>
            Envie uma foto do pet e nossa IA buscará possíveis correspondências.
        </p>
    </div>

    <div class="text-end mb-4">
        <a href="/cadastroPetPerdido" class="btn btn-success">
            ➕ Cadastrar pet perdido
        </a>
    </div>

    <div class="row">
        <div class="col-md-4" th:each="pet : ${pets}">
            <div class="card">
                <img th:src="@{${pet.imagem}}" class="pet-img">

                <div class="card-body">
                    <h5 th:text="${pet.nome}"></h5>

                    <p>
                        Raça: <span th:text="${pet.raca}"></span><br>
                        Idade: <span th:text="${pet.idade}"></span><br>
                        Cor: <span th:text="${pet.cor}"></span><br>
                        Último local: <span th:text="${pet.local}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
