<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loja Pet - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        /* Estilos base do catálogo unificado */
        .loja-hero {
            background: #2563EB !important; /* Azul Royal LudoPet */
            border-radius: var(--radius-lg, 16px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .loja-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 70% at 80% 30%, rgba(255, 212, 59, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Abas de Categorias Modernas */
        .loja-tabs {
            display: flex;
            gap: 12px;
            border-bottom: 2px solid #E2E8F0;
            padding-bottom: 12px;
            margin-bottom: 32px;
        }
        .loja-tab-btn {
            background: transparent;
            border: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #64748B;
            padding: 8px 16px;
            position: relative;
            transition: all 0.2s;
            cursor: pointer;
        }
        .loja-tab-btn:hover { color: #2563EB; }
        .loja-tab-btn.active {
            color: #2563EB;
        }
        .loja-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #2563EB;
            border-radius: 2px;
        }

        /* Vitrine de Cards */
        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .card-custom {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: #2563EB;
        }

        .card-custom-img-wrapper {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F8FAFC;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .card-custom img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .card-custom h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: #0F172A;
            margin-bottom: 6px;
            min-height: 40px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-custom p {
            font-size: 0.82rem;
            color: #64748B;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 36px;
        }

        .card-tag {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 8px;
            border-radius: 6px;
            width: fit-content;
            margin-bottom: 8px;
        }
        .tag-produto { background: #EFF6FF; color: #2563EB; }
        .tag-kit { background: #FEF3C7; color: #D97706; }

        .preco {
            font-size: 1.3rem;
            font-weight: 800;
            color: #0F172A;
            margin-bottom: 14px;
            margin-top: auto;
        }

        /* Carrinho de Compras Lateral Real */
        .checkout-box {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 24px;
            position: sticky;
            top: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #F1F5F9;
        }
        .summary-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #64748B;
            margin-bottom: 8px;
        }
    </style>
</head>

<body class="bg-light">

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container my-5" style="animation: pgIn .4s ease both;">

    <section class="loja-hero text-white p-5 mb-5">
        <span class="badge mb-2" style="background: rgba(255,255,255,0.2); font-family: 'Plus Jakarta Sans'; font-weight: 700;">🛍️ LudoPet Store</span>
        <h1 class="display-5 fw-bold mt-2" style="font-family: 'Fraunces', serif; font-weight: 900;">Catálogo e Kits de Adoção</h1>
        <p class="lead mb-0" style="color: rgba(255,255,255,0.85); font-size: 1rem; font-weight: 600;">Encontre produtos essenciais diários e kits completos estruturados para a chegada do seu novo amigo de quatro patas.</p>
    </section>

    <div class="row g-4">
        <div class="col-lg-8">

            <div class="loja-tabs">
                <button class="loja-tab-btn active" onclick="filtrarCatalogo('todos', this)">Todos os Itens</button>
                <button class="loja-tab-btn" onclick="filtrarCatalogo('venda', this)">🛍️ Produtos à Venda</button>
                <button class="loja-tab-btn" onclick="filtrarCatalogo('kit', this)">🎁 Kits do Adotante</button>
            </div>

            <div id="gridProdutos" class="produtos-grid"></div>
        </div>

        <div class="col-lg-4">
            <div class="checkout-box">
                <h4 style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1.25rem; color: #0F172A;" class="mb-4">
                    <i class="bi bi-bag-heart-fill text-primary me-2"></i>Seu Carrinho
                </h4>

                <div id="listaCarrinho" class="mb-4" style="max-height: 280px; overflow-y: auto;">
                </div>

                <div class="pt-3 border-top" style="border-color: #E2E8F0 !important;">
                    <div class="summary-line">
                        <span>Subtotal</span>
                        <span id="cartSubtotal" style="color: #0F172A; font-weight: 600;">R$ 0,00</span>
                    </div>
                    <div class="summary-line">
                        <span>Frete (São Luís)</span>
                        <span class="text-success" style="font-weight: 700;">GRÁTIS</span>
                    </div>
                    <hr style="color: #E2E8F0;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <strong style="font-size: 1.05rem; color: #0F172A;">Total do Pedido</strong>
                        <strong id="cartTotal" style="font-size: 1.4rem; color: #2563EB;">R$ 0,00</strong>
                    </div>
                </div>

                <button onclick="finalizarCompraCompleta()" class="btn w-100" style="background: #FFD43B; color: #1D4ED8; font-weight: 800; padding: 14px; border-radius: 12px; box-shadow: 0 4px 14px rgba(255, 212, 59, 0.4); border: none; transition: all 0.2s;">
                    <i class="bi bi-credit-card-2-back-fill me-2"></i> Fechar Pedido
                </button>
                <small class="text-muted d-block text-center mt-3" style="font-size: 0.75rem;"><i class="bi bi-shield-lock-fill me-1"></i> Ambiente de compra simulado com segurança.</small>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></header>

    <script>
        let carrinho = [];
        let categoriaAtual = 'todos';

        const produtosE_Kits = [
            {
                id: 101,
                tipo: "venda",
                nome: "Ração PremieR Cães Adultos 15kg",
                descricao: "Nutrição de alta performance, pelagem bonita e saudável para raças médias e grandes.",
                preco: 189.90,
                imagemUrl: "https://images.unsplash.com/photo-1589924691106-073b19f59392?q=80&w=300&auto=format&fit=crop"
            },
            {
                id: 102,
                tipo: "venda",
                nome: "Arranhador Torre Cat Confort",
                descricao: "Arranhador completo com brinquedo suspenso e plataforma revestida de sisal premium.",
                preco: 84.90,
                imagemUrl: "https://images.unsplash.com/photo-1545249390-6bdfa286032f?q=80&w=300&auto=format&fit=crop"
            },
            {
                id: 103,
                tipo: "venda",
                nome: "Shampoo Neutro Hidratante 500ml",
                descricao: "Fórmula hipoalergênica ideal para banhos frequentes, deixando o pelo macio.",
                preco: 32.90,
                imagemUrl: "https://images.unsplash.com/photo-1608454367599-c1139e64bf87?q=80&w=300&auto=format&fit=crop"
            },
            {
                id: 201,
                tipo: "kit",
                nome: "Kit Boas-Vindas Cão Adotado",
                descricao: "Combo essencial: Cama Soft G, comedouro duplo, coleira regulável, ração e brinquedo de corda.",
                preco: 249.90,
                imagemUrl: "https://images.unsplash.com/photo-1516715094727-ec48be335d79?q=80&w=300&auto=format&fit=crop"
            },
            {
                id: 202,
                tipo: "kit",
                nome: "Kit Conforto Gato Adotado",
                descricao: "Tudo para o felino: Caixa de areia, pá higiênica, comedouro, caminha toca e arranhador p.",
                preco: 179.90,
                imagemUrl: "https://images.unsplash.com/photo-1548767797-d8c844163c4c?q=80&w=300&auto=format&fit=crop"
            }
        ];

        function renderizarCatalogo(lista) {
            const div = document.getElementById("gridProdutos");
            div.innerHTML = "";

            lista.forEach(item => {
                const isKit = item.tipo === 'kit';

                div.innerHTML += `
                    <div class="card-custom">
                        <div class="card-custom-img-wrapper">
                            <img src="${item.imagemUrl}" alt="${item.nome}">
                        </div>
                        <div>
                            <span class="card-tag ${isKit ? 'tag-kit' : 'tag-produto'}">
                                ${isKit ? '🎁 Kit Adotante' : '🛍️ À Venda'}
                            </span>
                            <h3>${item.nome}</h3>
                            <p>${item.descricao}</p>
                        </div>
                        <div class="preco">R$ ${item.preco.toFixed(2)}</div>
                        <button onclick="adicionarAoCarrinho(${item.id})" class="btn w-100" style="background: #2563EB; color: white; font-weight: 700; border-radius: 8px; padding: 10px;">
                            <i class="bi bi-cart-plus-fill me-2"></i> Adicionar
                        </button>
                    </div>
                `;
            });
        }

        function filtrarCatalogo(tipo, botao) {
            document.querySelectorAll('.loja-tab-btn').forEach(b => b.classList.remove('active'));
            botao.classList.add('active');
            categoriaAtual = tipo;

            if (tipo === 'todos') {
                renderizarCatalogo(produtosE_Kits);
            } else {
                renderizarCatalogo(produtosE_Kits.filter(p => p.tipo === tipo));
            }
        }

        function adicionarAoCarrinho(id) {
            const item = produtosE_Kits.find(p => p.id === id);
            if (item) {
                carrinho.push(item);
                fetch("http://localhost:8081/api/carrinho", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nomeProduto: item.nome, preco: item.preco })
                }).catch(() => {}); // Consome erro silenciosamente caso API local esteja offline
                atualizarVisualCarrinho();
            }
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            atualizarVisualCarrinho();
        }

        function atualizarVisualCarrinho() {
            const container = document.getElementById("listaCarrinho");
            const subtotalTxt = document.getElementById("cartSubtotal");
            const totalTxt = document.getElementById("cartTotal");

            if (carrinho.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-4 text-muted">
                        <i class="bi bi-cart-x" style="font-size: 2.5rem;"></i>
                        <p class="mt-2 mb-0" style="font-size: 0.85rem; font-weight: 600;">Seu carrinho está vazio.</p>
                    </div>
                `;
                subtotalTxt.textContent = "R$ 0,00";
                totalTxt.textContent = "R$ 0,00";
                return;
            }

            let soma = 0;
            container.innerHTML = carrinho.map((item, index) => {
                soma += item.preco;
                return `
                    <div class="cart-item-row">
                        <div style="max-width: 70%;">
                            <strong style="font-size: 0.85rem; color: #0F172A; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.nome}</strong>
                            <span style="font-size: 0.75rem;" class="text-muted">${item.tipo === 'kit' ? '🎁 Combo Especial' : '🛍️ Item Avulso'}</span>
                        </div>
                        <div class="text-end">
                            <span style="font-size: 0.88rem; font-weight: 700; color: #0F172A; display: block;">R$ ${item.preco.toFixed(2)}</span>
                            <button onclick="removerDoCarrinho(${index})" style="background: none; border: none; color: #EF4444; font-size: 0.75rem; padding: 0; font-weight: 600;">Remover</button>
                        </div>
                    </div>
                `;
            }).join("");

            subtotalTxt.textContent = `R$ ${soma.toFixed(2)}`;
            totalTxt.textContent = `R$ ${soma.toFixed(2)}`;
        }

        function finalizarCompraCompleta() {
            if (carrinho.length === 0) {
                alert("Adicione pelo menos um item ou kit ao carrinho antes de fechar o pedido!");
                return;
            }

            const totalPedido = carrinho.reduce((acc, p) => acc + p.preco, 0);

            fetch("http://localhost:8081/api/pedidos", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    total: totalPedido,
                    produtos: carrinho.map(p => ({ id: p.id }))
                })
            })
            .then(() => {
                alert(`🎉 Pedido Confirmado com Sucesso!\n\nValor Total: R$ ${totalPedido.toFixed(2)}\n\n🐾 Parabéns por apoiar o LudoPet! Se você adquiriu um dos nossos Kits do Adotante, o abrigo parceiro será notificado para preparar os itens de boas-vindas do seu pet.`);
                carrinho = [];
                atualizarVisualCarrinho();
            })
            .catch(() => {
                alert(`🎉 [Simulação] Pedido Confirmado com Sucesso!\n\nValor Total: R$ ${totalPedido.toFixed(2)}\n\nObrigado por comprar no LudoPet!`);
                carrinho = [];
                atualizarVisualCarrinho();
            });
        }

        // Inicialização
        renderizarCatalogo(produtosE_Kits);
        atualizarVisualCarrinho();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
