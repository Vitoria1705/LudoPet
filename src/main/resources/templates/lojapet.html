<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loja Pet - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        #produtos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card-custom {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card-custom img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .preco {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container mt-4">

    <!-- CADASTRO -->
    <h2>➕ Cadastrar Produto</h2>

    <div class="mb-4">
        <input id="nome" placeholder="Nome" class="form-control mb-2">
        <input id="descricao" placeholder="Descrição" class="form-control mb-2">
        <input id="preco" type="number" placeholder="Preço" class="form-control mb-2">
        <input id="imagem" placeholder="URL da imagem" class="form-control mb-2">

        <button class="btn btn-primary" onclick="cadastrar()">Cadastrar</button>
    </div>

    <!-- PRODUTOS DINÂMICOS -->
    <h2>🛍 Produtos</h2>
    <div id="produtos"></div>

    <!-- CARRINHO -->
    <h2 class="mt-5">🛒 Carrinho</h2>
    <div id="carrinho" class="p-3 bg-white rounded"></div>
    <button class="btn btn-success mt-3"
            onclick="finalizarCompra()">
        Finalizar Compra
    </button>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
    let carrinho = [];

    function cadastrar() {
        const produto = {
            nome: document.getElementById("nome").value,
            descricao: document.getElementById("descricao").value,
            preco: parseFloat(document.getElementById("preco").value),
            imagemUrl: document.getElementById("imagem").value
        };

        fetch("http://localhost:8081/api/produtos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(produto)
        })
            .then(() => {
                alert("Produto cadastrado!");
                location.reload();
            });
    }

    function atualizarCarrinho() {
        const div = document.getElementById("carrinho");

        if (carrinho.length === 0) {
            div.innerHTML = "Carrinho vazio";
            return;
        }

        let total = 0;

        div.innerHTML = carrinho.map((p, i) => {
            total += p.preco;
            return `
                <div>
                    ${p.nome} - R$ ${p.preco}
                    <button onclick="remover(${i})">❌</button>
                </div>
            `;
        }).join("");

        div.innerHTML += `<hr><strong>Total: R$ ${total.toFixed(2)}</strong>`;
    }

    function comprar(nome, preco) {

        fetch("http://localhost:8081/api/carrinho", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                nomeProduto: nome,
                preco: preco
            })
        });

        carrinho.push({ nome, preco });
        atualizarCarrinho();
    }

    function remover(index) {
        carrinho.splice(index, 1);
        atualizarCarrinho();
    }
    function finalizarCompra() {

        fetch("http://localhost:8081/api/pedidos", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                total: carrinho.reduce((t, p) => t + p.preco, 0),
                produtos: carrinho
            })
        })
            .then(() => {
                alert("Pedido realizado com sucesso!");

                carrinho = [];

                atualizarCarrinho();
            });
    }

    function carregarProdutos() {
        fetch("http://localhost:8081/api/produtos")
            .then(r => r.json())
            .then(data => {
                const div = document.getElementById("produtos");
                div.innerHTML = "";

                data.forEach(produto => {
                    div.innerHTML += `
                    <div class="card-custom">
                        <img src="${produto.imagemUrl}">
                        <h3>${produto.nome}</h3>
                        <p>${produto.descricao}</p>
                        <div class="preco">R$ ${produto.preco}</div>
                        <button onclick="comprar('${produto.nome}', ${produto.preco})">
                            Comprar
                        </button>
                    </div>
                `;
                });
            });
    }

    carregarProdutos();
    atualizarCarrinho();
</script>

</body>
</html>
