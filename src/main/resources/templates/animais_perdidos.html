<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Animais Perdidos</title>

    <style>

        body {
            font-family: Arial;
            margin: 30px;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            width: 250px;
        }

        .btn {
            background-color: #63af63;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 6px;
        }

        .topo {
            text-align: center;
            margin-bottom: 20px;
        }

    </style>

</head>

<body>

<h1>📢 Animais Perdidos</h1>

<div class="topo">

    <a class="btn"
       href="/novo-animal-perdido">

        Cadastrar Animal Perdido 🐶

    </a>

</div>

<div class="container">

    <div class="card"
         th:each="animal : ${animais}">

        <img th:src="@{'/img/' + ${animal.foto}}"
             width="100%"
             height="180px"
             style="object-fit: cover;
            border-radius: 8px;">

        <h3 th:text="${animal.nome}"></h3>

        <p>
            <b>Espécie:</b>
            <span th:text="${animal.especie}"></span>
        </p>

        <p>
            <b>Raça:</b>
            <span th:text="${animal.raca}"></span>
        </p>

        <p>
            <b>Cidade:</b>
            <span th:text="${animal.cidade}"></span>
        </p>

        <p>
            <b>Contato:</b>
            <span th:text="${animal.telefone}"></span>
        </p>

        <p>
            <span th:text="${animal.descricao}"></span>
        </p>

    </div>

</div>
<div th:replace="fragments/footer :: footer"></div>

</body>

</html>
