<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animais para Adocao - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container py-5">
    <section class="page-hero mb-4">
        <span class="section-kicker">Adocao responsavel</span>
        <h1>Animais para adocao</h1>
        <p>Veja os pets disponiveis, abra os detalhes e envie sua solicitacao de adocao pelo formulario.</p>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-success" th:href="@{/adocao}">Disponiveis</a>
            <a class="btn btn-outline-secondary" th:href="@{/adocao/todos}">Todos os animais</a>
        </div>
    </section>

    <div class="alert alert-light border" th:if="${#lists.isEmpty(animais)}">
        Nenhum animal disponivel no momento.
    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(animais)}">
        <div class="col-sm-6 col-lg-4" th:each="animal : ${animais}">
            <article class="card animal-card h-100">
                <img th:src="@{'/img/' + ${animal.foto}}"
                     class="animal-card-img"
                     th:alt="|Foto de ${animal.nome}|"
                     onerror="this.src='/img/padrao.png'">

                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between gap-3 align-items-start">
                        <div>
                            <h2 class="h4 mb-1" th:text="${animal.nome}">Nome</h2>
                            <p class="text-muted mb-0" th:text="${animal.descricao}">Descricao do animal</p>
                        </div>
                        <span class="status-pill" th:text="${animal.status}">disponivel</span>
                    </div>

                    <div class="pet-facts my-4">
                        <span><strong>Raca</strong><small th:text="${animal.raca}">SRD</small></span>
                        <span><strong>Idade</strong><small th:text="${animal.idade}">0</small></span>
                        <span><strong>Sexo</strong><small th:text="${animal.sexo}">Sexo</small></span>
                        <span><strong>Porte</strong><small th:text="${animal.porte}">Porte</small></span>
                    </div>

                    <a class="btn btn-success w-100 mt-auto"
                       th:href="@{/detalhes/{id}(id=${animal.id})}">
                        Ver detalhes e adotar
                    </a>
                </div>
            </article>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
