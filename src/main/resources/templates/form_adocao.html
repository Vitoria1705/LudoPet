<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Adocao - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <section class="form-shell">
                <span class="section-kicker">Solicitacao de adocao</span>
                <h1>Formulario para adotar <span th:text="${animal.nome}">o pet</span></h1>
                <p class="text-muted">Preencha os dados com atencao. A equipe usa essas informacoes para entrar em contato e orientar os proximos passos.</p>

                <form method="post" th:action="@{/form-adocao}" class="row g-3 mt-2">
                    <input type="hidden" name="idAnimal" th:value="${animal.id}">

                    <div class="col-md-6">
                        <label class="form-label" for="nome">Nome completo</label>
                        <input id="nome" type="text" name="nome" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" type="email" name="email" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="telefone">Telefone</label>
                        <input id="telefone" type="text" name="telefone" class="form-control" placeholder="(98) 99999-9999">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="cidade">Cidade</label>
                        <input id="cidade" type="text" class="form-control" value="Sao Luis - MA">
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="motivo">Por que voce quer adotar?</label>
                        <textarea id="motivo" name="motivo" class="form-control" rows="5" required></textarea>
                    </div>

                    <div class="col-12 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success btn-lg">Enviar pedido</button>
                        <a th:href="@{/detalhes/{id}(id=${animal.id})}" class="btn btn-outline-secondary btn-lg">Voltar aos detalhes</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
