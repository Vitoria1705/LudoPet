<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Adoção</title>
</head>

<body>

<h2>
    Formulario de Adoção -
    <span th:text="${animal.nome}"></span>
</h2>

<form method="post"
      th:action="@{/form-adocao}">

    <input type="hidden"
           name="idAnimal"
           th:value="${animal.id}">

    <label>Nome:</label><br>
    <input type="text"
           name="nome"
           required>

    <br><br>

    <label>Email:</label><br>
    <input type="email"
           name="email"
           required>

    <br><br>

    <label>Telefone:</label><br>
    <input type="text"
           name="telefone">

    <br><br>

    <label>Motivo:</label><br>
    <textarea name="motivo"
              required>
</textarea>

    <br><br>

    <button type="submit">
        Enviar Pedido 🐶
    </button>

</form>

</body>

</html>
