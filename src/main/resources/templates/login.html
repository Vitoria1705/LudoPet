<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>

<body>

<h2>Login</h2>

<form th:action="@{/login}" method="post">

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Senha:</label><br>
    <input type="password" name="senha" required><br><br>

    <button type="submit">
        Entrar
    </button>

</form>

<p th:if="${erro}"
   th:text="${erro}"
   style="color:red">
</p>

</body>

</html>
