<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - LudoPet</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .login-box {

            background: white;
            padding: 40px;

            border-radius: 12px;

            width: 350px;

            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {

            text-align: center;
            margin-bottom: 25px;
        }

        input {

            width: 100%;
            padding: 12px;

            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {

            width: 100%;
            padding: 12px;

            border: none;

            background-color: #7c3aed;

            color: white;

            border-radius: 8px;

            cursor: pointer;

            font-size: 16px;
        }

        button:hover {

            background-color: #6d28d9;
        }

        .erro {

            color: red;

            text-align: center;

            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="login-box">

    <h2>Login LudoPet 🐾</h2>

    <form action="/login" method="post">

        <input
                type="email"
                name="email"
                placeholder="Digite seu email"
                required
        >

        <input
                type="password"
                name="senha"
                placeholder="Digite sua senha"
                required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    <p
            th:if="${erro}"
            th:text="${erro}"
            class="erro">
    </p>

</div>

</body>
</html>
