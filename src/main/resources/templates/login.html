<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

<main class="auth-shell">
    <section class="auth-panel">
        <a href="/" class="auth-brand">
            <img src="/img/logo/logo.jpeg" alt="LudoPet">
        </a>

        <span class="section-kicker">Area do usuario</span>
        <h1>Entrar na LudoPet</h1>
        <p class="text-muted">Acesse sua conta para acompanhar pedidos, cadastros e solicitacoes.</p>

        <form action="/login" method="post" class="mt-4">
            <label class="form-label" for="email">Email</label>
            <input id="email" type="email" name="email" class="form-control mb-3" placeholder="seuemail@exemplo.com" required>

            <label class="form-label" for="senha">Senha</label>
            <input id="senha" type="password" name="senha" class="form-control mb-3" placeholder="Digite sua senha" required>

            <button type="submit" class="btn btn-success btn-lg w-100">Entrar</button>
        </form>

        <p th:if="${erro}" th:text="${erro}" class="alert alert-danger mt-3 mb-0"></p>

        <p class="text-center mt-4 mb-0">
            Ainda nao tem conta?
            <a href="/cadastro">Criar cadastro</a>
        </p>
    </section>
</main>

</body>
</html>
