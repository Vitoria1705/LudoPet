<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Rede Parceiras - LudoPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<header th:replace="~{fragments/navbar :: navbar}">
</header>

<main class="container mt-5">

    <section class="text-center mb-5">

        <h1 class="fw-bold text-success">

            🏥 Rede Parceiras

        </h1>

        <p class="lead">

            Conheça clínicas,
            ONGs e parceiros
            que ajudam no cuidado animal.

        </p>

    </section>

    <div class="row g-4">

        <div class="col-md-4"
             th:each="parceiro : ${parceiros}">

            <div class="card shadow-sm h-100">

                <div class="card-body">

                    <h4 th:text="${parceiro.nome}">
                    </h4>

                    <span class="badge bg-success mb-3"
                          th:text="${parceiro.tipo}">
                    </span>

                    <p th:text="${parceiro.descricao}">
                    </p>

                    <p>

                        📍
                        <span th:text="${parceiro.endereco}">
                        </span>

                    </p>

                    <p>

                        📞
                        <span th:text="${parceiro.telefone}">
                        </span>

                    </p>

                </div>

            </div>

        </div>

    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}">
</footer>

</body>
</html>
